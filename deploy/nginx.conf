# 八马茶 AI 表达 Demo · nginx 网关配置
#
# 作用：
#   1. serve 前端静态原型（/frontend/*.html + bama-logo.png）
#   2. 反代后端 API（/api /docs /openapi.json /health /redoc）到 backend:8000
#
# 这样前端从 nginx 同源调 /api/...，不触发跨域、无需 CORS（后端仍保留 Demo
# 期放开 CORS，纯本地直连 8000 时也走得通，互不冲突）。云服务器单端口 8080
# 暴露即可同时拿到前端页面与后端接口。

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;
    # 前端原型是静态文件，给个合理的 ETag / 缓存
    server_tokens off;

    # 上游后端：compose 服务名 backend，容器内部 8000
    upstream backend {
        server backend:8000;
    }

    server {
        listen 8080;
        server_name _;

        # 静态前端根目录：compose 把 ./frontend 挂到 /usr/share/nginx/frontend
        root /usr/share/nginx/frontend;
        index desktop.html mobile.html;

        # ---- 后端反代：API / 文档 / 健康检查 ----
        # 生图（/api/image/generate）走豆包 Seedream，2K 出图常 >90s，超时也计费，
        # 故反代超时放宽到 310s（与后端 IMAGE_TIMEOUT=300 留余量），避免网关先于后端 504。
        location /api/ {
            proxy_pass http://backend;
            proxy_read_timeout  310s;
            proxy_send_timeout  310s;
            proxy_connect_timeout 10s;
        }
        location /docs      { proxy_pass http://backend; }
        location /openapi.json { proxy_pass http://backend; }
        location /redoc     { proxy_pass http://backend; }
        location /health    { proxy_pass http://backend; }
        location = / {
            # 根路径给桌面端原型
            try_files /desktop.html =404;
        }

        # 反代透传：后端 Swagger UI 的 fetch 与 OpenAPI 内部链接需要真实 host
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ---- 前端静态文件 ----
        # HTML 显式无缓存，便于联调改原型立即生效
        location ~* \.html$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
        # logo 等静态资源轻度缓存
        location ~* \.(webp|png|svg|ico|css|js)$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # 其余路径回落到静态文件 try_files
        location / {
            try_files $uri $uri/ /desktop.html;
        }
    }
}
