<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>八马茶业 · 八马茶语 AI 营销助手 — 手机端预览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
:root{
  --broth:#3D2817;--brothL:#5C3A22;--brothD:#241108;
  --paper:#F5EFE3;--paperW:#EDE3D0;--paperD:#E2D4BA;
  --moss:#2D4A3E;--mossL:#3F6451;
  --gold:#B8935A;--goldL:#D4B07A;--goldD:#8B6B3D;
  --cinnabar:#9B3A2F;
  --bamaOrange:#FF6B1A;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:"Noto Sans SC","Inter",sans-serif;background:var(--paper);color:var(--brothD);line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden}
.serif{font-family:"Noto Serif SC",serif}
.display{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-style:italic}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}
::selection{background:rgba(184,147,90,.3)}
.hidden{display:none!important}
.paper{background-color:var(--paper);background-image:radial-gradient(at 12% 20%,rgba(184,147,90,.08) 0,transparent 50%),radial-gradient(at 88% 12%,rgba(45,74,62,.06) 0,transparent 50%)}
.tea-grad{background:linear-gradient(135deg,#3D2817 0%,#5C3A22 50%,#241108 100%)}
.seal{display:inline-flex;align-items:center;justify-content:center;background:var(--cinnabar);color:var(--paper);font-family:"Noto Serif SC",serif;font-weight:700;letter-spacing:.1em;box-shadow:inset 0 0 0 2px rgba(245,239,227,.4);border-radius:4px;transform:rotate(-2deg)}
.deco-line{background:linear-gradient(90deg,transparent,rgba(184,147,90,.4) 20%,rgba(184,147,90,.8) 50%,rgba(184,147,90,.4) 80%,transparent);height:1px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{opacity:0;transform:translateY(24px) scale(.96)}60%{opacity:1;transform:translateY(-4px) scale(1.01)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideLeftIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes breath{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes ripple{0%{transform:scale(.8);opacity:.8}100%{transform:scale(2.2);opacity:0}}
@keyframes typingDot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
@keyframes steam{0%,100%{transform:translateY(0) scale(1);opacity:.4}50%{transform:translateY(-10px) scale(1.05);opacity:.7}}
@keyframes pulseGold{0%,100%{box-shadow:0 12px 32px -8px rgba(36,17,8,.5),0 0 0 0 rgba(184,147,90,.5)}50%{box-shadow:0 12px 32px -8px rgba(36,17,8,.5),0 0 0 12px rgba(184,147,90,0)}}
.anim-fade{animation:fadeIn .5s ease-out both}
.anim-up{animation:fadeUp .6s cubic-bezier(.16,1,.3,1) both}
.anim-pop{animation:popIn .45s cubic-bezier(.34,1.56,.64,1) both}

#app{height:100vh;height:100dvh;overflow:hidden;position:relative;max-width:480px;margin:0 auto;box-shadow:0 0 60px rgba(36,17,8,.15)}
.page{position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch}

/* ===== Home ===== */
.home-wrap{min-height:100%;position:relative;overflow-x:hidden;padding-bottom:120px}
.bg-deco{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.tea-leaf{position:absolute;color:var(--goldL);filter:drop-shadow(0 2px 8px rgba(184,147,90,.25))}
header.topbar{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:calc(16px + var(--safe-t)) 20px 12px}
.logo{display:flex;align-items:center;gap:10px}
.logo .mark{display:block}
.logo .t{font-family:"Noto Serif SC",serif;font-weight:900;letter-spacing:.1em;font-size:16px;color:var(--brothD)}
.logo .s{font-family:"Cormorant Garamond",serif;font-style:italic;letter-spacing:.2em;font-size:10px;color:var(--brothD);opacity:.7;margin-top:2px}
.top-tag{border:1px solid rgba(184,147,90,.3);border-radius:999px;padding:3px 9px;font-size:10px;color:var(--goldD)}
.hero{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;padding:20px 20px 32px;text-align:center}
.hero-sub{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.hero-sub .line{width:28px;height:1px;background:linear-gradient(90deg,transparent,rgba(184,147,90,.6))}
.hero-sub .line.r{background:linear-gradient(90deg,rgba(184,147,90,.6),transparent)}
.hero h1{font-family:"Noto Serif SC",serif;font-weight:900;letter-spacing:.12em;font-size:56px;color:var(--brothD);text-shadow:0 4px 24px rgba(184,147,90,.15)}
.hero h1 .gold{background:linear-gradient(135deg,#D4B07A,#B8935A,#8B6B3D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;display:inline-block}
.hero-en{font-family:"Cormorant Garamond",serif;font-style:italic;letter-spacing:.18em;font-size:18px;color:var(--goldD);margin-top:12px}
.hero-desc{margin-top:6px;max-width:340px;font-size:14px;color:rgba(92,58,34,.8)}
.hero-bowl{position:relative;margin-top:24px;width:80px;height:80px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:2px solid rgba(184,147,90,.3);background:rgba(245,239,227,.6)}
.hero-bowl .inner{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3D2817,#241108)}
.hero-bowl .inner svg{display:block}
.ripple{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(184,147,90,.4);animation:ripple 2.4s ease-in-out infinite}
.ripple.d{animation-delay:1.2s}
.hero-kbd{margin-top:16px;display:flex;align-items:center;gap:6px;font-size:10px;color:rgba(92,58,34,.55)}
.hero-kbd svg{width:11px;height:11px;color:var(--gold)}
.hero-kbd kbd{padding:2px 6px;border:1px solid rgba(184,147,90,.4);background:rgba(245,239,227,.8);border-radius:4px;font-family:monospace;font-size:9px;color:var(--brothD)}
.block{position:relative;z-index:10;padding:28px 20px}
.sec-head{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;margin-bottom:24px}
.sec-kicker{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold)}
.sec-kicker .l{width:20px;height:1px;background:rgba(184,147,90,.4)}
.sec-head h2{font-family:"Noto Serif SC",serif;font-weight:700;font-size:24px;color:var(--brothD)}
.sec-head p{font-size:13px;color:rgba(92,58,34,.7)}
.feat-card{position:relative;overflow:hidden;border-radius:20px;border:1px solid rgba(184,147,90,.2);background:rgba(245,239,227,.7);padding:20px;box-shadow:0 8px 24px -8px rgba(36,17,8,.2);margin-bottom:16px}
.feat-card .glow{position:absolute;right:-40px;top:-40px;width:120px;height:120px;border-radius:50%;background:rgba(184,147,90,.1);filter:blur(32px)}
.feat-card .num{position:absolute;right:16px;top:12px;font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:700;font-size:48px;color:rgba(184,147,90,.1)}
.feat-head{display:flex;align-items:center;gap:10px;position:relative;z-index:2}
.feat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--paper)}
.feat-icon.gold{background:var(--gold)}
.feat-icon.moss{background:var(--moss)}
.feat-icon svg{width:20px;height:20px}
.feat-title{font-family:"Noto Serif SC",serif;font-weight:700;font-size:18px;color:var(--brothD)}
.feat-sub{font-family:"Cormorant Garamond",serif;font-style:italic;letter-spacing:.18em;font-size:11px;color:rgba(92,58,34,.6)}
.feat-desc{margin-top:12px;font-size:13px;color:rgba(61,40,23,.8);position:relative;z-index:2}
.feat-list{margin-top:12px;display:flex;flex-direction:column;gap:6px;position:relative;z-index:2}
.feat-list li{list-style:none;display:flex;align-items:flex-start;gap:6px;font-size:12px;color:rgba(92,58,34,.8)}
.feat-list li::before{content:"→";color:var(--gold);font-weight:700}
.entry-card{position:relative;overflow:hidden;border-radius:20px;border:1px solid rgba(184,147,90,.3);padding:22px;text-align:left;box-shadow:0 12px 36px -8px rgba(36,17,8,.35);transition:transform .2s;color:var(--paper);width:100%;margin-bottom:14px}
.entry-card:active{transform:scale(.98)}
.entry-card.dom{background:linear-gradient(135deg,#3D2817,#5C3A22,#241108)}
.entry-card.ovs{background:linear-gradient(135deg,#2D4A3E,#3F6451,#241108)}
.entry-card .glow{position:absolute;right:-50px;top:-50px;width:140px;height:140px;border-radius:50%;background:rgba(184,147,90,.2);filter:blur(36px)}
.entry-card .corner-seal{position:absolute;bottom:12px;right:12px}
.entry-head{display:flex;align-items:center;gap:10px;position:relative;z-index:2}
.entry-ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(184,147,90,.15);border:1px solid rgba(184,147,90,.4)}
.entry-ic svg{width:20px;height:20px;color:var(--goldL)}
.entry-title{font-family:"Noto Serif SC",serif;font-weight:700;font-size:20px;letter-spacing:.08em;color:var(--paper)}
.entry-sub{font-family:"Cormorant Garamond",serif;font-style:italic;letter-spacing:.18em;font-size:12px;color:rgba(212,176,122,.8)}
.entry-desc{margin-top:12px;font-size:13px;color:rgba(245,239,227,.75);position:relative;z-index:2}
.entry-tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;position:relative;z-index:2}
.entry-tag{display:inline-flex;align-items:center;gap:4px;border:1px solid rgba(184,147,90,.25);background:rgba(36,17,8,.3);padding:3px 8px;border-radius:999px;font-size:10px;color:rgba(245,239,227,.8)}
.entry-tag svg{width:10px;height:10px;color:var(--gold)}
.entry-cta{margin-top:12px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--goldL);position:relative;z-index:2}
.entry-cta .arr{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(184,147,90,.2);border:1px solid rgba(184,147,90,.4)}
.foot{position:relative;z-index:10;text-align:center;padding:20px;display:flex;flex-direction:column;align-items:center;gap:6px}
.foot .mini{display:flex;align-items:center;gap:6px}
.foot .mini .mark{width:28px;height:19px}
.foot .mini .t{font-family:"Noto Serif SC",serif;font-weight:700;font-size:12px;color:var(--brothD)}
.foot p{font-size:10px;color:rgba(92,58,34,.6)}
.foot .en{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:9px;color:rgba(184,147,90,.6)}

.home-cta-fixed{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(20px + var(--safe-b));z-index:40;width:calc(100% - 40px);max-width:440px}
.home-cta-fixed .btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;padding:16px 20px;font-size:15px;font-weight:700;color:var(--paper);background:linear-gradient(135deg,#3D2817,#241108);box-shadow:0 12px 32px -8px rgba(36,17,8,.5);animation:pulseGold 2.4s ease-in-out infinite;border:1px solid rgba(184,147,90,.5)}
.home-cta-fixed .btn:active{transform:scale(.98)}
.home-cta-fixed .btn .ic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--gold);color:var(--brothD)}
.home-cta-fixed .btn .ic svg{width:14px;height:14px}
.home-cta-fixed .btn .kk{font-family:monospace;font-size:10px;background:rgba(184,147,90,.25);padding:2px 6px;border-radius:4px;color:var(--goldL)}

/* ===== Workbench ===== */
.wb{display:flex;flex-direction:column;height:100%;position:relative;overflow:hidden}
.wb-bg{position:absolute;inset:0;z-index:0;pointer-events:none}
.wb-bg .b1{position:absolute;left:-80px;top:10%;width:240px;height:240px;border-radius:50%;background:rgba(184,147,90,.05);filter:blur(50px)}
.wb-bg .b2{position:absolute;right:-80px;bottom:20%;width:240px;height:240px;border-radius:50%;background:rgba(45,74,62,.05);filter:blur(50px)}
.wb-top{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:calc(12px + var(--safe-t)) 16px 12px;background:linear-gradient(135deg,#3D2817,#241108);color:var(--paper);box-shadow:0 4px 16px -4px rgba(36,17,8,.4)}
.wb-top .lf{display:flex;align-items:center;gap:10px}
.hist-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid rgba(184,147,90,.3);background:rgba(36,17,8,.4);color:var(--goldL)}
.hist-btn svg{width:16px;height:16px}
.wb-brand{display:flex;align-items:center;gap:8px}
.wb-brand .mark{width:28px;height:19px}
.wb-brand .t{font-family:"Noto Serif SC",serif;font-weight:700;font-size:14px;letter-spacing:.1em;color:var(--paper)}
.wb-brand .s{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:9px;color:rgba(212,176,122,.7)}
.ed-switch{display:flex;align-items:center;gap:6px;border:1px solid rgba(184,147,90,.3);background:rgba(36,17,8,.4);border-radius:999px;padding:6px 12px;color:var(--paper);position:relative}
.ed-switch:active{transform:scale(.96)}
.ed-switch svg{width:12px;height:12px;color:var(--goldL)}
.ed-switch .t{font-family:"Noto Serif SC",serif;font-size:11px;font-weight:600;letter-spacing:.08em}
.ed-switch .chev{transition:transform .2s}
.ed-switch.open .chev{transform:rotate(180deg)}
.ed-menu{position:absolute;top:calc(100% + 8px);right:0;width:180px;z-index:50}
.ed-menu-inner{overflow:hidden;border-radius:16px;border:1px solid rgba(184,147,90,.4);background:var(--paper);box-shadow:0 16px 40px -8px rgba(36,17,8,.5);animation:fadeUp .2s both}
.ed-menu-h{border-bottom:1px solid rgba(184,147,90,.15);background:linear-gradient(135deg,#3D2817,#241108);padding:8px 12px;text-align:center}
.ed-menu-h span{font-family:"Noto Serif SC",serif;font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--paper)}
.ed-menu-list{display:flex;flex-direction:column;padding:6px}
.ed-item{display:flex;align-items:center;gap:8px;border-radius:10px;padding:10px 12px;text-align:left;width:100%}
.ed-item:active{background:var(--paperW)}
.ed-item.active{background:rgba(184,147,90,.15)}
.ed-item .ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(61,40,23,.1);color:var(--broth)}
.ed-item.active .ic{background:var(--gold);color:var(--brothD)}
.ed-item .ic svg{width:14px;height:14px}
.ed-item .meta{flex:1;display:flex;flex-direction:column;line-height:1.2}
.ed-item .meta .t{font-size:13px;font-weight:600;color:var(--brothD)}
.ed-item .meta .s{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:10px;color:rgba(92,58,34,.6)}
.ed-item .kk{font-family:monospace;font-size:9px;background:rgba(61,40,23,.1);padding:2px 5px;border-radius:4px;color:rgba(92,58,34,.7)}
.ed-item .ck{width:14px;height:14px;color:var(--gold)}
.ed-menu-f{display:flex;align-items:center;justify-content:center;gap:5px;border-top:1px solid rgba(184,147,90,.15);background:rgba(237,227,208,.5);padding:6px;font-size:9px;color:rgba(92,58,34,.6)}
.ed-menu-f svg{width:10px;height:10px}

/* ===== History Panel (mobile left slide) ===== */
.hist-mask{position:fixed;inset:0;z-index:60;background:rgba(36,17,8,.6);backdrop-filter:blur(4px);animation:fadeIn .25s both}
.hist-panel{position:fixed;left:0;top:0;bottom:0;z-index:61;width:80%;max-width:320px;background:var(--paper);box-shadow:4px 0 32px -4px rgba(36,17,8,.3);display:flex;flex-direction:column;animation:slideLeftIn .3s cubic-bezier(.16,1,.3,1) both}
.hist-panel-head{display:flex;align-items:center;justify-content:space-between;padding:calc(16px + var(--safe-t)) 16px 12px;border-bottom:1px solid rgba(184,147,90,.2);background:linear-gradient(135deg,#3D2817,#241108);color:var(--paper)}
.hist-panel-head .htitle{font-family:"Noto Serif SC",serif;font-weight:700;font-size:16px;letter-spacing:.08em}
.hist-panel-head .new-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:999px;background:var(--gold);color:var(--brothD);font-size:12px;font-weight:600}
.hist-panel-head .new-btn svg{width:12px;height:12px}
.hist-close{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid rgba(184,147,90,.3);background:rgba(36,17,8,.4);color:var(--goldL);margin-left:8px}
.hist-close svg{width:14px;height:14px}
.hist-list{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch}
.hist-item{padding:12px 14px;border-radius:12px;cursor:pointer;transition:all .15s;margin-bottom:4px}
.hist-item:active{background:rgba(184,147,90,.1)}
.hist-item.active{background:rgba(184,147,90,.15);box-shadow:inset 0 0 0 1px rgba(184,147,90,.3)}
.hist-item .ht{font-size:13px;font-weight:600;color:var(--brothD);line-height:1.4;margin-bottom:4px}
.hist-item .hs{font-size:11px;color:rgba(92,58,34,.6);line-height:1.4}
.hist-item .htime{font-size:10px;color:rgba(92,58,34,.4);margin-top:6px}
.hist-empty{padding:40px 20px;text-align:center;font-size:12px;color:rgba(92,58,34,.4)}

/* ===== Selbar ===== */
.selbar{position:relative;z-index:10;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(184,147,90,.15);background:rgba(245,239,227,.5);padding:10px 14px;overflow-x:auto;white-space:nowrap;backdrop-filter:blur(4px);flex-shrink:0}
.selbar::-webkit-scrollbar{display:none}
.selbar .head{display:flex;align-items:center;gap:6px;padding-right:6px;flex-shrink:0}
.selbar .head svg{width:14px;height:14px;color:var(--gold)}
.selbar .head .t{font-family:"Noto Serif SC",serif;font-size:13px;font-weight:600;color:var(--brothD)}
.selbar .head .s{font-size:10px;color:rgba(92,58,34,.5)}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(184,147,90,.3);background:rgba(245,239,227,.85);padding:6px 10px;border-radius:999px;font-size:11px;flex-shrink:0;transition:all .2s}
.pill:active{background:rgba(184,147,90,.18);border-color:var(--gold)}
.pill .l{color:rgba(92,58,34,.6)}
.pill .v{font-weight:500;color:var(--brothD);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill .ed{width:11px;height:11px;color:var(--goldD)}
.pill.all-pill{background:linear-gradient(135deg,#3D2817,#241108);color:var(--goldL);border-color:var(--gold);font-weight:600}
.pill.all-pill .l{color:var(--goldL)}
.pill.all-pill .v{color:var(--paper)}
.pill.all-pill svg{color:var(--goldL);opacity:1}

.chat-area{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.chat-empty{position:relative;flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.chat-empty .box{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;position:relative;z-index:2}
.chat-empty .ic{position:relative;width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3D2817,#241108);box-shadow:0 8px 24px -8px rgba(36,17,8,.4)}
.chat-empty .ic svg{display:block}
.chat-empty h3{font-family:"Noto Serif SC",serif;font-size:17px;font-weight:600;color:var(--brothD)}
.chat-empty p{max-width:300px;font-size:13px;color:rgba(92,58,34,.7)}
.chat-empty .deco{width:100px}
.chat-empty .en{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:11px;color:rgba(184,147,90,.8)}

.chat-list{position:relative;z-index:10;flex:1;overflow-y:auto;padding:16px 14px;-webkit-overflow-scrolling:touch}
.chat-list .inner{display:flex;flex-direction:column;gap:16px}
.msg{display:flex;width:100%;gap:8px;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both}
.msg.user{justify-content:flex-end}
.av{flex-shrink:0;margin-top:4px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.av.bot{background:linear-gradient(135deg,#3D2817,#241108);position:relative}
.av.bot svg{display:block}
.av.bot .online{position:absolute;bottom:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:var(--gold);border:1.5px solid var(--paper);animation:breath 2s ease-in-out infinite}
.av.me{background:var(--moss)}
.av.me span{font-family:"Noto Serif SC",serif;font-weight:700;font-size:14px;color:var(--paper)}
.msg-body{display:flex;flex-direction:column;gap:6px;max-width:76%}
.msg.user .msg-body{align-items:flex-end}
.msg-name{padding:0 4px;font-size:10px;font-weight:500;color:rgba(92,58,34,.7)}
.bubble{position:relative;padding:10px 14px;font-size:14px;border-radius:14px}
.bubble.bot{background:var(--paper);color:var(--brothD);border-top-left-radius:4px;border:1px solid rgba(184,147,90,.2)}
.bubble.bot .tip{position:absolute;left:-5px;top:10px;width:10px;height:10px;transform:rotate(45deg);background:var(--paper);border-left:1px solid rgba(184,147,90,.2);border-bottom:1px solid rgba(184,147,90,.2)}
.bubble.me{background:linear-gradient(135deg,#3D2817,#241108);color:var(--paper);border-top-right-radius:4px}
.bubble p{white-space:pre-wrap}
.cands{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.cand{border-radius:999px;background:rgba(184,147,90,.15);padding:5px 10px;font-size:11px;font-weight:500;color:var(--goldD)}
.cand:active{background:rgba(184,147,90,.3)}
.fb-link{margin-top:10px;display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(92,58,34,.6);text-decoration:underline;text-underline-offset:2px}
.opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.opt{display:flex;align-items:center;gap:6px;border:1px solid rgba(184,147,90,.4);background:rgba(245,239,227,.5);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:500;color:var(--broth)}
.opt:active{background:var(--gold);color:var(--paper)}
.opt .d{width:5px;height:5px;border-radius:50%;background:var(--gold)}
.typing-msg .bubble.bot{display:flex;align-items:center;gap:10px}
.typing-dots{display:flex;align-items:center;gap:5px}
.typing-dots span{display:block;width:7px;height:7px;border-radius:50%;background:var(--gold);animation:typingDot 1.4s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.16s}
.typing-dots span:nth-child(3){animation-delay:.32s}
.typing-text{font-size:13px;font-weight:500;color:var(--brothL);animation:breath 2s ease-in-out infinite}
.mat-preview{display:flex;width:100%;gap:8px;animation:fadeUp .5s both}
.mat-card{overflow:hidden;border-radius:14px;border-top-left-radius:4px;border:1px solid rgba(184,147,90,.2);background:var(--paper);max-width:80%}
.mat-img-wrap{position:relative;aspect-ratio:4/3;width:100%;min-width:200px;overflow:hidden;background:linear-gradient(135deg,#3D2817,#241108)}
.mat-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.mat-badge{position:absolute;left:8px;top:8px;display:flex;align-items:center;gap:4px;border-radius:999px;background:rgba(36,17,8,.7);padding:3px 8px;font-size:10px;color:var(--paper);backdrop-filter:blur(4px)}
.mat-badge svg{width:10px;height:10px}
.mat-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px}
.mat-foot .meta-t{font-size:12px;font-weight:500;color:var(--brothD)}
.mat-foot .meta-s{font-size:10px;color:rgba(92,58,34,.6)}
.mat-dl{border-radius:999px;background:linear-gradient(135deg,#3D2817,#241108);padding:5px 10px;font-size:11px;font-weight:500;color:var(--paper)}
.chat-input{position:relative;z-index:10;border-top:1px solid rgba(184,147,90,.15);background:rgba(245,239,227,.5);padding:10px 14px calc(10px + var(--safe-b));backdrop-filter:blur(4px);flex-shrink:0}
.input-wrap{display:flex;align-items:center;gap:8px;border-radius:999px;background:rgba(245,239,227,.9);padding:8px 8px 8px 14px;border:1px solid rgba(61,40,23,.1)}
.input-wrap.active{border-color:var(--gold)}
.input-wrap.disabled{opacity:.6}
.input-wrap input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--brothD);min-width:0}
.input-wrap input::placeholder{color:rgba(92,58,34,.4)}
.send-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn.on{background:linear-gradient(135deg,#3D2817,#241108);color:var(--paper)}
.send-btn.off{background:rgba(92,58,34,.2);color:rgba(92,58,34,.4)}
.send-btn svg{width:15px;height:15px}

.bottom-nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-around;background:linear-gradient(135deg,#3D2817,#241108);padding:8px 8px calc(8px + var(--safe-b));box-shadow:0 -8px 24px -8px rgba(36,17,8,.4);flex-shrink:0}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;color:rgba(245,239,227,.55);position:relative;border-radius:12px;transition:color .2s}
.bn-item:active{color:var(--paper)}
.bn-item.active{color:var(--goldL)}
.bn-item .ic-wrap{position:relative}
.bn-item svg{width:20px;height:20px}
.bn-item .dot{position:absolute;right:-3px;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 1.5px var(--broth)}
.bn-item .lbl{font-family:"Noto Serif SC",serif;font-size:11px;font-weight:600;letter-spacing:.06em}
.bn-item.active .bar{position:absolute;top:4px;left:50%;transform:translateX(-50%);width:20px;height:3px;border-radius:999px;background:var(--gold)}

.sheet-mask{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;justify-content:flex-end;animation:fadeIn .3s both}
.sheet-overlay{position:absolute;inset:0;background:rgba(36,17,8,.7);backdrop-filter:blur(6px)}

.sheet-return .t{font-size:12px;font-weight:500}

.opt-card.wide{flex:1 1 100%}
.opt-card.sel{border-color:var(--gold);background:rgba(184,147,90,.1);box-shadow:0 0 0 1px rgba(184,147,90,.3)}
.opt-card .row{display:flex;width:100%;align-items:center;justify-content:space-between;gap:6px}
.opt-card .l{font-size:13px;font-weight:500;color:var(--broth)}

.opt-card .ck{width:15px;height:15px;border-radius:50%;background:var(--gold);color:var(--paper);display:flex;align-items:center;justify-content:center;flex-shrink:0}

.opt-card .d{font-size:10px;line-height:1.3;color:rgba(92,58,34,.6)}
.sub-panel{margin-top:4px;width:100%;display:flex;flex-wrap:wrap;gap:6px;padding:8px;border-radius:10px;border:1px solid rgba(184,147,90,.2);background:rgba(245,239,227,.4);animation:fadeUp .25s ease-out both}

.input-row{margin-top:4px;width:100%;display:flex;align-items:center;gap:8px;padding:8px;border-radius:10px;border:1px solid rgba(184,147,90,.3);background:rgba(245,239,227,.6);animation:fadeUp .25s ease-out both}
.input-row input{flex:1;border:1px solid rgba(139,107,71,.15);background:var(--paper);border-radius:8px;padding:8px 12px;font-size:14px;color:var(--brothD);outline:none;min-width:0}

.input-row .tag{font-size:10px;color:rgba(92,58,34,.5);flex-shrink:0}

function fuzzyMatch(i,cs){
  const n=i.trim().toLowerCase();
  if(!n)return null;
  for(const c of cs)if(c.toLowerCase()===n)return c;
  for(const c of cs)if(c.toLowerCase().includes(n)||n.includes(c.toLowerCase()))return c;
  return null;
}

function formatTime(ts){
  const now=Date.now();
  const diff=now-ts;
  const day=24*60*60*1000;
  if(diff<day)return "今天";
  if(diff<2*day)return "昨天";
  const d=new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function handleOption(act,lbl){
  pushMsg("user",lbl,"text");paintMessages();
  if(act==="overview"){
    typeThen(1600,()=>{
      const ov=S.copy.taskType==="component-to-flavor"?OVERVIEW[S.copy.teaCategory]:DIM_OVERVIEW[S.copy.teaCategory];
      pushMsg("assistant",ov||"暂未收录该品类的整体总览。","result");
      S.stage="done";
      saveCurrentToHistory();
      paintMessages();
    });
  }else if(act==="specific"){
    S.stage="copy:await";S.awaitInput=true;
    typeThen(900,()=>{
      pushMsg("assistant",S.copy.taskType==="component-to-flavor"?"您想咨询的特定成分是什么？请输入成分名称（如氨基酸、茶多酚、咖啡碱等）。":"您想咨询的特定维度是什么？请输入（如香气、味道、产地、口感、外形）。","text");
      paintMessages();
    });
  }else if(act==="confirm"){
    typeThen(2800,()=>{
      const isOvs=S.edition==="overseas";
      const tea=isOvs&&S.mat.teaCategory?S.mat.teaCategory:"茶叶";
      const cl=MAT_CONTENT.find(c=>c.v===S.mat.content)?.l||"";
      pushMsg("assistant",`已为您生成「${tea}」的${cl}${S.mat.modality==="image"?"图片":"视频"}物料。`,"image",{
        imagePrompt:`${tea} ${S.mat.content==="tea-marketing"?"marketing":"tea culture"} ${S.mat.style} for ${S.mat.platform}`,
        payload:{modality:S.mat.modality,style:S.mat.style,platform:S.mat.platform}
      });
      S.stage="done";
      saveCurrentToHistory();
      paintMessages();
    });
  }else if(act==="cancel"){
    typeThen(700,()=>{
      pushMsg("assistant","好的，已取消本次生成。您可以重新设置参数后发起。","text");
      S.stage="done";
      saveCurrentToHistory();
      paintMessages();
    });
  }
}
function sendUserInput(text){
  text=text.trim();if(!text)return;
  pushMsg("user",text,"text");S.awaitInput=false;paintMessages();
  typeThen(1400,()=>{
    const isComp=S.copy.taskType==="component-to-flavor";
    const all=[];let matched=null;
    const kb=isComp?COMPONENT_KB:DIM_KB;
    for(const e of kb){
      const a2=isComp?[e.component,...e.aliases]:[e.dimension,...e.aliases];
      if(fuzzyMatch(text,a2))matched=e;
      all.push(...a2);
      if(matched)break;
    }
    if(matched){
      const t=isComp?matched.component:matched.dimension;
      const fd=isComp?matched.flavor:matched.description;
      pushMsg("assistant",`「${t}」对应风味：${fd}\n\n${matched.detail}`,"result");
      S.stage="done";
    }else{
      const uniq=[...new Set(all)].slice(0,6);
      pushMsg("assistant","您是否想问以下关键词？\n点击候选词快速补全，或通过反馈入口告诉我们。","feedback",{candidates:uniq});
      S.stage="copy:await";S.awaitInput=true;
    }
    saveCurrentToHistory();
    paintMessages();
  });
}
function restartChat(){
  S.messages=[];S.typing=false;S.awaitInput=false;S.stage="idle";
  if(S.mode==="copy")startCopyChat();
  else startMaterialChat();
}

    `;
    const edSw=top.querySelector("#edSw");
    if(edSw)edSw.addEventListener("click",e=>{e.stopPropagation();S.edMenuOpen=!S.edMenuOpen;renderWorkbenchOnly();});
    top.querySelectorAll(".ed-item").forEach(b=>b.addEventListener("click",()=>{
      S.edMenuOpen=false;
      const ed=b.dataset.ed;
      if(ed!==S.edition)switchEdition(ed);
      else renderWorkbenchOnly();
    }));
  }
  if(selbar)selbar.outerHTML=renderSelBar();
  if(chatArea)chatArea.innerHTML=renderChatArea();
  if(bottomNav){
    bottomNav.innerHTML=`${["copy","material"].map(m=>{
      const active=S.mode===m;const conf=m==="copy"?S.copyConfirmed:S.matConfirmed;
      return `<button class="bn-item ${active?'active':''}" data-mode="${m}">${active?'<span class="bar"></span>':''}<div class="ic-wrap">${svg(m==='copy'?'file':'pkg')}${conf?'<span class="dot"></span>':''}</div><span class="lbl">${m==='copy'?'文案':'物料'}</span></button>`;
    }).join("")}`;
    bottomNav.querySelectorAll(".bn-item").forEach(b=>b.addEventListener("click",()=>{
      const m=b.dataset.mode;
      if(m===S.mode)return;
      saveCurrentToHistory();
      S.mode=m;
      S.preField=null;
      const conf=m==="copy"?S.copyConfirmed:S.matConfirmed;
      const hist=S.history.find(h=>h.mode===m&&h.confirmed);
      if(hist){switchHistory(hist.id);return;}
      if(!conf){
        S.messages=[];
        S.currentHistoryId=null;
        S.preOpen=true;S.preMode=m;
        renderWorkbenchOnly();
        renderSheet();
        bindSheetEvents();
      }else{
        renderWorkbenchOnly();
      }
    }));
  }
  const newSelbar=wb.querySelector(".selbar");
  if(newSelbar){
    newSelbar.querySelectorAll(".pill").forEach(p=>p.addEventListener("click",()=>{
      const mode=p.dataset.mode;
      const field=p.dataset.field;
      if(field==="all")openAllPreSelect();
      else openFieldEdit(mode,field);
    }));
  }
  bindChat();
}

/* ===== BOTTOM SHEET (no-jitter version) ===== */
function renderSheet(){
  const isOvs=S.edition==="overseas";
  const isCopy=S.preMode==="copy";
  const firstTime=isCopy?!S.copyConfirmed:!S.matConfirmed;
  const isField=!!S.preField;
  const sh=h("div","sheet-mask");
  const title=isField?`${isCopy?'文案':'物料'} · 修改 · ${fieldTitle(S.preField)}`:`${isCopy?'文案 · 前置选择':'物料 · 前置选择'}`;
  const sub=isField?'选择后点击底部「保存修改」生效':(firstTime?'请完成必选项 · 随时可点上方返回':'点击任意项可修改');
  const statusText=isField?'单字段修改模式':(canConfirm()?'信息已完整，可进入对话':'请完成所有必选项');
  const statusClass=isField?'neutral':(canConfirm()?'ok':'no');
  const btnText=isField?'保存修改':(firstTime?'开始对话':'保存修改');
  sh.innerHTML=`<div class="sheet-overlay" onclick="closePre()"></div>
    <button class="sheet-return" onclick="closePre()"><span class="ic">${svg("back")}</span><span class="t">返回</span><span class="kk">Esc</span></button>
    <div class="sheet-card">
      <div class="handle"></div>
      <div class="sheet-head"><div class="left"><span class="seal" style="padding:2px 8px;font-size:10px">${isOvs?'海外':'国内'}</span><div><div class="title">${title}</div><div class="sub">${sub}</div></div></div></div>
      <div class="sheet-body"><div class="form" id="sheetForm">${isField?renderSingleField():renderFullFields()}</div></div>
      <div class="sheet-foot">
        <div class="status ${statusClass}" id="sheetStatus">${svg("alert")}<span>${statusText}</span></div>
        <button class="confirm-btn ${isField||canConfirm()?'on':'off'}" id="sheetConfirm" ${isField||canConfirm()?'':'disabled'} onclick="${isField?'closePre()':'confirmPre()'}">${svg("check")}<span>${btnText}</span></button>
      </div>
    </div>`;
  app.appendChild(sh);
}
function bindSheetEvents(){
  const form=document.getElementById("sheetForm");
  if(!form)return;
  form.addEventListener("click",e=>{
    const card=e.target.closest(".opt-card");
    if(card&&card.dataset.field){
      e.preventDefault();
      handleOptCardClick(card);
      return;
    }
    const timeCat=e.target.closest("[data-time-cat]");
    if(timeCat){
      e.preventDefault();
      handleTimeCategoryClick(timeCat.dataset.timeCat);
      return;
    }
    const ovsTime=e.target.closest("[data-ovs-time]");
    if(ovsTime){
      e.preventDefault();
      handleOverseasTimeClick(ovsTime.dataset.ovsTime);
      return;
    }
  });
  const customInput=form.querySelector("[data-custom-input]");
  if(customInput){
    customInput.addEventListener("input",e=>{
      const field=e.target.dataset.customInput;
      S.customTimeInput=e.target.value;
      setField(field,e.target.value);
      updateSheetFoot();
    });
  }
}
function handleOptCardClick(card){
  const field=card.dataset.field;
  const value=card.dataset.value;
  if(!field)return;
  setField(field,value);
  const optsRow=card.closest('.opts-row, .sub-panel');
  if(optsRow){
    optsRow.querySelectorAll(`.opt-card[data-field="${field}"]`).forEach(o=>{
      o.classList.remove("sel");
      const ck=o.querySelector(".ck");
      if(ck)ck.remove();
    });
  }
  card.classList.add("sel");
  const row=card.querySelector(".row");
  if(row&&!card.querySelector(".ck")){
    const ck=document.createElement("span");
    ck.className="ck";
    ck.innerHTML=svg("check");
    row.appendChild(ck);
  }
  updateSheetFoot();
  if(field==="timeNode"&&S.preField===null){
    refreshTimeNodeSection();
  }
}
function handleTimeCategoryClick(cat){
  if(cat==="日常零售"){
    setField('timeNode','日常零售');
  }else if(cat==="其他"){
    S.customTimeInput="";
    setField('timeNode',"");
  }else{
    setField('timeNode',"");
  }
  refreshTimeNodeSection();
  updateSheetFoot();
}
function handleOverseasTimeClick(n){
  if(n==="其他"){
    S.customTimeInput="";
    setField('timeNode',"");
  }else{
    setField('timeNode',n);
  }
  refreshTimeNodeSection();
  updateSheetFoot();
}
function refreshTimeNodeSection(){
  const field=document.querySelector('.field[data-time-field]');
  if(!field)return;
  const isOvs=S.edition==="overseas";
  const isCopy=S.preMode==="copy";
  const sel=isCopy?S.copy:S.mat;
  field.outerHTML=renderTimeNodeField(isOvs,sel,true);
  const newField=document.querySelector('.field[data-time-field]');
  if(newField){
    newField.querySelectorAll(".opt-card").forEach(opt=>{
      opt.addEventListener("click",e=>{
        e.preventDefault();
        if(opt.dataset.field)handleOptCardClick(opt);
      });
    });
    newField.querySelectorAll('[data-time-cat]').forEach(btn=>{
      btn.addEventListener("click",e=>{
        e.preventDefault();
        handleTimeCategoryClick(btn.dataset.timeCat);
      });
    });
    newField.querySelectorAll('[data-ovs-time]').forEach(btn=>{
      btn.addEventListener("click",e=>{
        e.preventDefault();
        handleOverseasTimeClick(btn.dataset.ovsTime);
      });
    });
    const customInput=newField.querySelector('[data-custom-input]');
    if(customInput){
      customInput.addEventListener("input",e=>{
        S.customTimeInput=e.target.value;
        setField(e.target.dataset.customInput,e.target.value);
        updateSheetFoot();
      });
    }
  }
}
function setField(field,val){
  if(S.preMode==="copy")S.copy[field]=val;
  else S.mat[field]=val;
}
function updateSheetFoot(){
  const status=document.getElementById("sheetStatus");
  const btn=document.getElementById("sheetConfirm");
  const isField=!!S.preField;
  if(!status||!btn)return;
  if(isField){
    status.className="status neutral";
    status.querySelector("span").textContent="单字段修改模式";
    btn.className="confirm-btn on";
    btn.disabled=false;
  }else{
    const ok=canConfirm();
    status.className=`status ${ok?'ok':'no'}`;
    status.querySelector("span").textContent=ok?'信息已完整，可进入对话':'请完成所有必选项';
    btn.className=`confirm-btn ${ok?'on':'off'}`;
    btn.disabled=!ok;
  }
}
function canConfirm(){
  const isOvs=S.edition==="overseas";
  const isCopy=S.preMode==="copy";
  let can=false;
  if(isCopy){
    can=!!(S.copy.taskType&&S.copy.teaCategory&&S.copy.targetConsumer);
    if(isOvs)can=can&&!!S.copy.language&&!!S.copy.flavorReference;
  }else{
    can=!!(S.mat.content&&S.mat.modality&&S.mat.style&&S.mat.platform);
    if(isOvs)can=can&&!!S.mat.teaCategory&&!!S.mat.language&&!!S.mat.targetConsumer&&!!S.mat.flavorReference;
  }
  return can;
}

/* ----- full fields (first-time) ----- */
function renderFullFields(){
  const isOvs=S.edition==="overseas";
  const isCopy=S.preMode==="copy";
  let html="";
  if(isCopy){
    const c=S.copy;
    html+=field("任务类型",true,optsCards([["component-to-flavor","成分 → 风味","把茶叶成分翻译为风味"],["vague-to-vivid","模糊 → 形象描述","将抽象表述转化为具象画面"]],c.taskType,"taskType",true));
    html+=field("茶叶品类",true,optsCards(TEA_CATEGORIES.map(t=>[t,t]),c.teaCategory,"teaCategory"));
    html+=field("目标消费者",true,optsCards(TARGET_CONSUMERS.map(x=>[x.v,x.l,x.d]),c.targetConsumer,"targetConsumer",true));
    html+=field("语气",false,optsCards(TONES.map(t=>[t,t]),c.tone,"tone"));
    html+=field("长度",false,optsCards(LENGTHS.map(t=>[t,t]),c.length,"length"));
    html+=renderTimeNodeField(isOvs,c,true);
    if(isOvs){
      html+=field("语言",true,optsCards(LANGS.map(l=>[l.v,l.l]),c.language,"language"));
      html+=field("是否参考咖啡/红酒风味体系",true,optsCards(FLAVOR_REF.map(x=>[x.v,x.l,x.d]),c.flavorReference,"flavorReference",true));
    }
  }else{
    const m=S.mat;
    html+=field("内容",true,optsCards(MAT_CONTENT.map(x=>[x.v,x.l,x.d]),m.content,"content",true));
    html+=field("模态",true,optsCards(MODALITY.map(x=>[x.v,x.l]),m.modality,"modality"));
    html+=field("风格",true,optsCards(MAT_STYLES.map(t=>[t,t]),m.style,"style"));
    html+=field("平台",true,optsCards((isOvs?OVS_PLATFORMS:DOM_PLATFORMS).map(t=>[t,t]),m.platform,"platform"));
    if(isOvs){
      html+=field("茶叶品类",true,optsCards(TEA_CATEGORIES.map(t=>[t,t]),m.teaCategory||"","teaCategory"));
      html+=field("语言",true,optsCards(LANGS.map(l=>[l.v,l.l]),m.language,"language"));
      html+=field("目标消费者",true,optsCards(TARGET_CONSUMERS.map(x=>[x.v,x.l,x.d]),m.targetConsumer||"","targetConsumer",true));
      html+=field("是否参考咖啡/红酒风味体系",true,optsCards(FLAVOR_REF.map(x=>[x.v,x.l,x.d]),m.flavorReference,"flavorReference",true));
      html+=field("语气",false,optsCards(TONES.map(t=>[t,t]),m.tone||"温润亲切","tone"));
      html+=field("长度",false,optsCards(LENGTHS.map(t=>[t,t]),m.length||"中（80-200字）","length"));
    }
  }
  return html;
}

/* ----- single field (edit mode) ----- */
function renderSingleField(){
  const isCopy=S.preMode==="copy";
  const sel=isCopy?S.copy:S.mat;
  const f=S.preField;
  const isOvs=S.edition==="overseas";
  if(f==="taskType"){
    const o=[["component-to-flavor","成分 → 风味","把茶叶成分翻译为风味"],["vague-to-vivid","模糊 → 形象描述","将抽象表述转化为具象画面"]];
    return field("任务类型",true,optsCards(o,sel.taskType,"taskType",true));
  }
  if(f==="teaCategory")return field("茶叶品类",true,optsCards(TEA_CATEGORIES.map(t=>[t,t]),sel.teaCategory||"","teaCategory"));
  if(f==="targetConsumer")return field("目标消费者",true,optsCards(TARGET_CONSUMERS.map(x=>[x.v,x.l,x.d]),sel.targetConsumer||"","targetConsumer",true));
  if(f==="tone")return field("语气",false,optsCards(TONES.map(t=>[t,t]),sel.tone||"","tone"));
  if(f==="length")return field("长度",false,optsCards(LENGTHS.map(t=>[t,t]),sel.length||"","length"));
  if(f==="timeNode")return renderTimeNodeField(isOvs,sel,false);
  if(f==="language")return field("语言",true,optsCards(LANGS.map(l=>[l.v,l.l]),sel.language||"","language"));
  if(f==="flavorReference")return field("是否参考咖啡/红酒风味体系",true,optsCards(FLAVOR_REF.map(x=>[x.v,x.l,x.d]),sel.flavorReference||"","flavorReference",true));
  if(f==="content")return field("内容",true,optsCards(MAT_CONTENT.map(x=>[x.v,x.l,x.d]),sel.content||"","content",true));
  if(f==="modality")return field("模态",true,optsCards(MODALITY.map(x=>[x.v,x.l]),sel.modality||"","modality"));
  if(f==="style")return field("风格",true,optsCards(MAT_STYLES.map(t=>[t,t]),sel.style||"","style"));
  if(f==="platform")return field("平台",true,optsCards((isOvs?OVS_PLATFORMS:DOM_PLATFORMS).map(t=>[t,t]),sel.platform||"","platform"));
  return "";
}

/* ----- options cards (string-based with data attributes) ----- */
function optsCards(items,sel,fieldName,wide){
  return items.map(it=>{
    const[v,l,d]=it;
    const isSel=v===sel;
    return `<button class="opt-card ${wide?'wide':''} ${isSel?'sel':''}" data-field="${fieldName}" data-value="${escapeAttr(v)}">
      <div class="row"><span class="l">${l}</span>${isSel?`<span class="ck">${svg("check")}</span>`:''}</div>
      ${d?`<span class="d">${d}</span>`:''}
    </button>`;
  }).join("");
}

/* ----- time node field ----- */
function renderTimeNodeField(isOvs,sel,dataAttr){
  const cur=sel.timeNode||"";
  if(isOvs){
    const isOther=cur&&!OVERSEAS_TIME_NODES.includes(cur);
    if(isOther&&!S.customTimeInput)S.customTimeInput=cur;
    let body=OVERSEAS_TIME_NODES.map(n=>{
      const sel2=n==="其他"?isOther:cur===n;
      return `<button class="opt-card ${sel2?'sel':''}" data-ovs-time="${n}">
        <div class="row"><span class="l">${n}</span>${sel2?'<span class="ck">'+svg("check")+'</span>':''}</div>
      </button>`;
    }).join("");
    if(isOther){
      body+=`<div class="input-row"><input type="text" value="${escapeAttr(S.customTimeInput)}" placeholder="Please enter specific occasion" data-custom-input="timeNode"/><span class="tag">手动输入</span></div>`;
    }
    return `<div class="field" ${dataAttr?'data-time-field':''}><div class="label-row"><span class="label">时间节点</span><span class="hint">· 可调</span></div><div class="opts-row">${body}</div></div>`;
  }
  let cat="";
  if(cur){
    if(TIME_NODE_CATEGORIES.includes(cur))cat=cur;
    else if(LEGAL_HOLIDAYS.includes(cur))cat="法定节日";
    else if(TRADITIONAL_SOLAR_TERMS.includes(cur))cat="传统节气";
    else if(SHOPPING_FESTIVALS.includes(cur))cat="购物节";
    else cat="其他";
  }
  if(cat==="其他"&&!S.customTimeInput)S.customTimeInput=cur;
  let body=TIME_NODE_CATEGORIES.map(c=>`<button class="opt-card ${cat===c?'sel':''}" data-time-cat="${c}">
    <div class="row"><span class="l">${c}</span>${cat===c?'<span class="ck">'+svg("check")+'</span>':''}</div>
  </button>`).join("");
  if(cat==="法定节日"){
    body+=`<div class="sub-panel">${LEGAL_HOLIDAYS.map(hd=>`<button class="opt-card ${cur===hd?'sel':''}" data-field="timeNode" data-value="${hd}"><div class="row"><span class="l">${hd}</span>${cur===hd?'<span class="ck">'+svg("check")+'</span>':''}</div></button>`).join("")}</div>`;
  }else if(cat==="传统节气"){
    body+=`<div class="sub-panel">${TRADITIONAL_SOLAR_TERMS.map(t=>`<button class="opt-card ${cur===t?'sel':''}" data-field="timeNode" data-value="${t}"><div class="row"><span class="l">${t}</span>${cur===t?'<span class="ck">'+svg("check")+'</span>':''}</div></button>`).join("")}</div>`;
  }else if(cat==="购物节"){
    body+=`<div class="sub-panel">${SHOPPING_FESTIVALS.map(s=>`<button class="opt-card ${cur===s?'sel':''}" data-field="timeNode" data-value="${s}"><div class="row"><span class="l">${s}</span>${cur===s?'<span class="ck">'+svg("check")+'</span>':''}</div></button>`).join("")}</div>`;
  }else if(cat==="其他"){
    body+=`<div class="input-row"><input type="text" value="${escapeAttr(S.customTimeInput)}" placeholder="请输入具体节日或时间，如「腊八节」" data-custom-input="timeNode"/><span class="tag">手动输入</span></div>`;
  }
  return `<div class="field" ${dataAttr?'data-time-field':''}><div class="label-row"><span class="label">时间节点</span><span class="hint">· 可调</span></div><div class="opts-row">${body}</div></div>`;
}

/* ----- field / opts helpers ----- */
function field(label,req,content,hint){
  return `<div class="field"><div class="label-row"><span class="label">${label}</span>${req?'<span class="req"><span class="d"></span>必选</span>':''}${hint?`<span class="hint">· ${hint}</span>`:''}</div><div class="opts-row">${content||""}</div></div>`;
}
function closePre(){
  S.preOpen=false;S.preMode=null;S.preField=null;
  const mask=document.querySelector(".sheet-mask");
  if(mask)mask.remove();
  renderWorkbenchOnly();
}
function confirmPre(){
  if(!canConfirm())return;
  if(S.preMode==="copy")S.copyConfirmed=true;
  else S.matConfirmed=true;
  S.preOpen=false;S.preMode=null;S.preField=null;
  S.messages=[];S.stage="idle";S.awaitInput=false;
  const mask=document.querySelector(".sheet-mask");
  if(mask)mask.remove();
  renderWorkbenchOnly();
}

/* ===== KEYBOARD ===== */
window.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&S.preOpen){e.preventDefault();closePre();return;}
  if(e.key==="Escape"&&S.histOpen){e.preventDefault();closeHistory();return;}
  if(!e.altKey)return;
  const k=e.key.toLowerCase();
  if(e.shiftKey&&k==="d"){
    e.preventDefault();
    if(S.page!=="home")switchEdition("domestic");
    else goWorkbench("domestic");
  }else if(e.shiftKey&&k==="o"){
    e.preventDefault();
    if(S.page!=="home")switchEdition("overseas");
    else goWorkbench("overseas");
  }else if(!e.shiftKey&&k==="k"&&S.page!=="home"){
    e.preventDefault();
    S.edMenuOpen=!S.edMenuOpen;
    renderWorkbenchOnly();
  }
});
document.addEventListener("click",e=>{
  if(!S.edMenuOpen)return;
  const w=e.target.closest("#edSwitchWrap");
  if(!w){S.edMenuOpen=false;renderWorkbenchOnly();}
});

render();
</script>
</body>
</html>
