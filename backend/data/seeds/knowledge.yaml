  # ===== 牛一武夷岩茶 =====
  - tea_id: BAMA_NY_WRT_DHP
    origin:
      region: 福建武夷山岩茶产区
      terroir: "世界文化与自然双遗产地、武夷岩茶核心产区"
      source_note: "页面表述'以牛栏坑为代表的正岩山场'不等同于该SKU全部原料均来自牛栏坑；具体山场必须有SKU包装/溯源证明才可写入产品事实"
    process:
      name: 武夷岩茶传统制作工艺
      steps: ["萎凋", "做青", "杀青", "揉捻", "干燥", "焙火"]
      key_technique: "做青与焙火控制；焙火是烘焙香形成关键步骤，高温焙火促进吡嗪、吡咯、呋喃等烘焙香物质"
      brand_claim: "正岩山场、高香岩韵、非遗技艺；'千里挑一，选出真正好岩茶'"
    story:
      title: 牛一：千里挑一的岩茶
      content: "牛一是八马核心明星系列，代表武夷岩茶、焙火和'岩韵'，品牌概括为'千里挑一，选出真正好岩茶'。大红袍为拼配产品，牛一系列还包括肉桂、水仙、奇丹等品种，风味不可混用。品牌主张三项价值：正岩山场、高香岩韵、非遗技艺。高温焙火是形成烘焙香的关键步骤，促进吡嗪、吡咯、呋喃等物质形成，与咖啡烘焙共享热反应路径。'岩韵/岩骨花香'包含山场、品种、工艺及口腔结构感，并非单一矿物味。页面表述'以牛栏坑为代表的正岩山场'不等同于该SKU全部原料均来自牛栏坑。"
      cultural_core: "岩韵/岩骨花香包含山场、品种、工艺及口腔结构感，并非单一矿物味。不宜直接翻成'mineral flavor'后结束。"
      cultural_tree: ["牛一大红袍SKU", "牛一明星系列", "武夷岩茶", "大红袍/拼配与具体品种", "做青与焙火", "Yan Yun（岩韵）", "武夷岩茶制作技艺与武夷山地域文化", "中国乌龙茶体系"]
      cultural_nodes:
