      brand_claim: "非遗技艺，国家级非遗代表性传承人王文礼监制"
    story:
      title: 赛珍珠：百年传承，浓香经典
      content: "八马传统优势与最成熟明星系列，具有'三香''音韵'等品牌标识。赛珍珠浓香型铁观音以'闻干茶炒米香、闻茶汤果甜香、品滋味兰花香'的三香递进为核心感官框架，品牌概括为'百年传承，浓香经典'。铁观音制作技艺强调看青做青的经验判断与焙火工艺控制，由国家级非遗代表性传承人王文礼监制。'音韵'是铁观音品种、地域、工艺与滋味综合形成的整体感受，不可简化为单一香气。"
      cultural_core: "音韵是铁观音品种、地域、工艺与滋味综合形成的整体感受，适合保留拼音/专名并配解释，不宜只译成一种香气。"
      cultural_tree: ["赛珍珠SKU", "赛珍珠明星系列", "安溪铁观音", "乌龙茶/做青工艺", "浓香型与焙火", "Guanyin Yun（音韵）", "安溪铁观音制作技艺与闽南饮茶文化", "中国乌龙茶体系"]
