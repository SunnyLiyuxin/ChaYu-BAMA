  # ===== 鼎红武夷红茶 =====
  - tea_id: BAMA_DH_BT_JJM
    origin:
      region: 福建武夷山，金骏眉核心原产地桐木关
      terroir: "世界红茶发源地福建武夷山；国家地理标志、双世遗武夷山"
      source_note: "桐木关核心原产地为官方商品页声明，具体原料边界应以包装执行标准和产地标识为准"
    process:
      name: 武夷红茶传统制作工艺
      steps: ["萎凋", "揉捻", "氧化（行业常称'发酵'）", "干燥"]
      key_technique: "'全发酵'是行业习惯表达，科学上主要为酶促氧化。品牌提出'3D萃香工艺，3重复合香型'，目前属品牌工艺术语。"
      brand_claim: "3D萃香工艺：初显花香（清雅悠扬）→ 中段果蜜香（灵动清甜）→ 尾调薄荷甜香（清新自然）"
    story:
      title: 鼎红：武夷红茶的代表
      content: "鼎红是八马核心明星系列，代表红茶的萎凋—揉捻—氧化路径，典型花果/花蜜甜香适合跨文化传播。金骏眉是芽型武夷红茶，来自世界红茶发源地福建武夷山桐木关核心原产地。品牌提出'3D萃香工艺，3重复合香型'：初显花香（清雅悠扬）→中段果蜜香（灵动清甜）→尾调薄荷甜香（清新自然）。'全发酵'是行业习惯表达，科学上主要为酶促氧化。金骏眉作为中文产品专名，不宜逐字翻译为Golden Horse Eyebrow。"
      cultural_core: "金骏眉是中文产品专名，不宜逐字翻译为'Golden Horse Eyebrow'。建议保留'Jin Jun Mei'并解释其为芽型武夷红茶。"
      cultural_tree: ["鼎红金骏眉SKU", "鼎红明星系列", "武夷红茶", "萎凋→揉捻→氧化→干燥", "花蜜甜香", "Jin Jun Mei名称与红茶发展", "武夷红茶及中国红茶体系", "红茶的全球传播史"]
