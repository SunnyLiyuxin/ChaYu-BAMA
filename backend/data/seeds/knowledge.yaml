      region: 福建安溪铁观音地理标志产品范围
      terroir: "山地丘陵、云雾充足、昼夜温差较明显，适宜乌龙茶香气形成"
      source_note: "八马高山生态茶园；品牌表述'安溪原产'"
    process:
      name: 铁观音传统制作工艺（浓香型）
      steps: ["晒青", "凉青", "摇青", "杀青", "揉捻", "焙火"]
