# 成分 → 口感 映射（第 1→2 层桥接关系的物化）
# 把散落在 component_notes / dimensions.description / evidence.notes 里的
# "成分→口感"对应结构化成行，供 UI"成分追溯"板块直接渲染。
#
# 科学性原则：每条只挂有直接文献支持的论断，不硬凑证据不足的映射。
#   confidence 如实区分：medium = 直接支持（文献研究对象含该茶/该品类），
#   low = 品类代理 / 综述共性（非单品实测，不代表八马单品检测值）。
#   evidence_ids 全部指向 evidence.yaml 已有条目，不新造证据。
#
# 这是第 1→2 层桥接关系，不是纵向追溯链的一层：
#   "成分追溯"指每条论断的证据溯源（靠 evidence_ids 指向论文），
#   不进 trace_links 表、不新增 level。
#
# flavor_key 指向该茶 flavor_profiles.dimensions[].key（茶级归属，因茶而异）；
# 若某成分对应不到现成 dimension，置空只给 flavor_label。
#
# 枚举约定（seed 注释说明，不在 ORM 层硬约束——遵循"字段不齐一律 nullable"）：
#   component_category: aroma_compound（挥发物） | taste_compound（滋味成分） | process_proxy（机理代理如美拉德、焙火路径）
#   relationship:       primary_driver（主要造就） | contributes_to（共同贡献） | participant（参与）
#   confidence:         high | medium | low

